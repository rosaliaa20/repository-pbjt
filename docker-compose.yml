version: '3.8'

services:
  backend:
    image: ghcr.io/rosaliaa20/repository-pbjt:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e-repository-kampus-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=${DB_PASS}
      - DB_NAME=e_repository_kampus
      - JWT_SECRET=${JWT_SECRET}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - MYSQLDUMP_PATH=mysqldump
      - MYSQL_PATH=mysql
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_wwebjs:/app/backend/.wwebjs_auth
    deploy:
      placement:
        constraints:
          - node.hostname == ${SWARM_NODE:-swarm-worker-1}

  db:
    image: mysql:8.0
    container_name: e-repository-kampus-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=e_repository_kampus
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    configs:
      - source: db_init
        target: /docker-entrypoint-initdb.d/e_repository_kampus.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.hostname == ${SWARM_NODE:-swarm-worker-1}

volumes:
  db_data:
  backend_uploads:
  backend_wwebjs:

configs:
  db_init:
    file: ./e_repository_kampus.sql
